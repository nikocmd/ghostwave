<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Player</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.14);
  --glass-hover: rgba(255,255,255,0.13);
  --blur: blur(24px);
  --text: rgba(255,255,255,0.92);
  --text-dim: rgba(255,255,255,0.38);
  --text-mid: rgba(255,255,255,0.62);
  --accent: rgba(255,255,255,0.9);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0a0f;
  color: var(--text);
  position: relative;
}

/* Animated gradient background */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
  animation: drift linear infinite;
}

.bg-orb:nth-child(1) {
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, #6c3fc5, transparent 70%);
  top: -20%; left: -10%;
  animation-duration: 18s;
}

.bg-orb:nth-child(2) {
  width: 50vw; height: 50vw;
  background: radial-gradient(circle, #1a6fa8, transparent 70%);
  bottom: -15%; right: -5%;
  animation-duration: 22s;
  animation-direction: reverse;
}

.bg-orb:nth-child(3) {
  width: 40vw; height: 40vw;
  background: radial-gradient(circle, #c2386e, transparent 70%);
  top: 40%; left: 50%;
  animation-duration: 26s;
}

@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(4vw, -5vh) scale(1.06); }
  66%  { transform: translate(-3vw, 4vh) scale(0.95); }
  100% { transform: translate(0,0) scale(1); }
}

/* Dynamic bg tint from artwork */
.bg-art {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
  background-size: cover;
  background-position: center;
  filter: blur(60px) saturate(1.6);
  transform: scale(1.15);
}

.bg-art.visible { opacity: 0.22; }

/* App shell */
.app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 420px;
  margin: 0 auto;
  padding: 0 20px;
  overflow: hidden;
}

/* Glass card */
.glass {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: 20px;
}

/* ── Now Playing ── */
.now-playing {
  flex: 0 0 auto;
  padding: 28px 24px 22px;
  margin-top: 52px;
  position: relative;
  overflow: hidden;
}

.now-playing::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.artwork-wrap {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.05);
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  transition: transform 0.3s ease;
}

.artwork-wrap.playing {
  transform: scale(1.02);
  box-shadow: 0 28px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
}

.artwork-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.artwork-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
  opacity: 0.15;
}

.track-info {
  margin-bottom: 18px;
}

.track-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.track-artist {
  font-size: 14px;
  font-weight: 300;
  color: var(--text-mid);
  letter-spacing: 0.02em;
}

/* Progress */
.progress-wrap {
  margin-bottom: 16px;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  margin-bottom: 8px;
}

.progress-bar::before {
  content: '';
  position: absolute;
  top: -8px; bottom: -8px; left: 0; right: 0;
}

.progress-fill {
  height: 100%;
  background: rgba(255,255,255,0.85);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s linear;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: -4px; top: -3px;
  width: 9px; height: 9px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  opacity: 0;
  transition: opacity 0.2s;
}

.progress-bar:hover .progress-fill::after { opacity: 1; }

.times {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.04em;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: all 0.18s ease;
  font-size: 16px;
}

.ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }
.ctrl-btn.active { color: var(--text); }

.ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }

.play-btn {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.92);
  border: none;
  border-radius: 50%;
  color: #0a0a0f;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s ease;
  font-size: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  flex-shrink: 0;
}

.play-btn:hover {
  transform: scale(1.06);
  background: #fff;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.play-btn svg { width: 22px; height: 22px; fill: #0a0a0f; }

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
}

.vol-icon { color: var(--text-dim); font-size: 13px; flex-shrink: 0; }

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ── Queue ── */
.queue-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-top: 14px;
  margin-bottom: 20px;
  min-height: 0;
  overflow: hidden;
}

.queue-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
  margin-bottom: 10px;
}

.queue-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.queue-count {
  font-size: 11px;
  color: var(--text-dim);
}

.queue-list {
  flex: 1;
  overflow-y: auto;
  border-radius: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
}

.queue-list::-webkit-scrollbar { width: 0; }

.queue-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
  position: relative;
}

.queue-item:last-child { border-bottom: none; }
.queue-item:hover { background: var(--glass-hover); }
.queue-item.active { background: rgba(255,255,255,0.1); }

.qi-art {
  width: 40px; height: 40px;
  border-radius: 8px;
  flex-shrink: 0;
  overflow: hidden;
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  opacity: 0.5;
}

.qi-art img { width:100%; height:100%; object-fit:cover; }

.qi-info { flex: 1; min-width: 0; }

.qi-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.queue-item.active .qi-title { color: #fff; }

.qi-artist {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.qi-fav {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 15px;
  padding: 4px;
  transition: all 0.15s;
  flex-shrink: 0;
  line-height: 1;
}

.qi-fav.on { color: #ff6b9d; }

.qi-playing {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 14px;
  flex-shrink: 0;
}

.qi-playing span {
  display: block;
  width: 3px;
  background: rgba(255,255,255,0.7);
  border-radius: 2px;
  animation: eq 0.8s ease infinite alternate;
}

.qi-playing span:nth-child(1) { height: 6px; animation-delay: 0s; }
.qi-playing span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
.qi-playing span:nth-child(3) { height: 8px; animation-delay: 0.4s; }

@keyframes eq {
  from { transform: scaleY(0.4); }
  to { transform: scaleY(1); }
}

.empty-queue {
  padding: 32px;
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
}

/* Hidden iframe */
#sc-frame { position: fixed; width: 1px; height: 1px; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; border: none; }

/* Fade-in */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.now-playing { animation: fadeUp 0.6s ease both; }
.queue-section { animation: fadeUp 0.6s 0.1s ease both; }

/* Tabs */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  padding: 0 2px;
}

.tab-btn {
  flex: 1;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  color: var(--text-dim);
  border-radius: 10px;
  padding: 8px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 400;
}

.tab-btn.active {
  background: rgba(255,255,255,0.14);
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-art" id="bg-art"></div>

<iframe id="sc-frame" src="" allow="autoplay"></iframe>

<div class="app">

  <!-- Now Playing -->
  <div class="glass now-playing">
    <div class="artwork-wrap" id="artwork-wrap">
      <div class="artwork-placeholder" id="artwork-placeholder">♪</div>
      <img id="artwork-img" src="" alt="" style="display:none;">
    </div>

    <div class="track-info">
      <div class="track-title" id="track-title">Chargement…</div>
      <div class="track-artist" id="track-artist"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="times">
        <span id="time-cur">0:00</span>
        <span id="time-tot">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()" title="Aléatoire">
        <svg viewBox="0 0 24 24"><path d="M17 4l4 4-4 4V9h-1.5c-.8 0-1.5.4-2 1l-4.2 5.3c-.8 1-1.9 1.7-3.3 1.7H4v-2h2c.8 0 1.5-.4 2-1l4.2-5.3c.8-1 1.9-1.7 3.3-1.7H17V4zm0 8v1h-1.5c-.5 0-1 .2-1.4.5l1.4 1.8c.4-.2.9-.3 1.5-.3H17v-1l4 4-4 4v-3h-1.5c-1.4 0-2.5-.7-3.3-1.7l-1.3-1.7L12.8 14l1.2 1.5c.5.6 1.2 1 2 1H17v-4z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-fav" onclick="favCurrent()">
        <svg id="fav-icon" viewBox="0 0 24 24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
      </button>
    </div>

    <div class="volume-row">
      <span class="vol-icon">🔈</span>
      <input type="range" min="0" max="100" value="80" id="vol-slider" oninput="setVolume(this.value)">
      <span class="vol-icon">🔊</span>
    </div>
  </div>

  <!-- Queue -->
  <div class="queue-section">
    <div class="queue-header">
      <div class="tabs" style="flex:1;margin:0;">
        <button class="tab-btn active" onclick="switchTab('all')" id="tab-all">File d'écoute</button>
        <button class="tab-btn" onclick="switchTab('fav')" id="tab-fav">Favoris</button>
      </div>
    </div>
    <div class="queue-list" id="queue-list"></div>
  </div>

</div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const PLAYLIST_URL = 'https://soundcloud.com/nikodmtr/sets/buntato-mori';

// ─── State ─────────────────────────────────────────────────────────────────
let tracks = [];
let favorites = new Set(JSON.parse(localStorage.getItem('wv_favs') || '[]'));
let currentIndex = -1;
let isPlaying = false;
let shuffle = false;
let currentTab = 'all';
let widget = null;
let duration = 0;

// ─── SC Widget ─────────────────────────────────────────────────────────────
function loadSCAPI() {
  const s = document.createElement('script');
  s.src = 'https://w.soundcloud.com/player/api.js';
  s.onload = () => initPlayer();
  document.head.appendChild(s);
}

function initPlayer() {
  const frame = document.getElementById('sc-frame');
  frame.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(PLAYLIST_URL)}&auto_play=false&hide_related=true&show_comments=false&show_user=false&buying=false&liking=false&download=false&sharing=false&show_artwork=true&show_playcount=false&show_teaser=false`;
  

  const tryBind = () => {
    if (!window.SC || !window.SC.Widget) { setTimeout(tryBind, 200); return; }

    widget = SC.Widget(frame);
    widget.bind(SC.Widget.Events.READY, () => {
      widget.setVolume(80);

      // Load all tracks from playlist
      widget.getSounds(sounds => {
        tracks = sounds.map(s => ({
          id: s.id,
          title: s.title || 'Track',
          artist: s.user ? s.user.username : '',
          art: s.artwork_url ? s.artwork_url.replace('-large', '-t300x300') : null,
        }));
        renderQueue();

        // Auto-play first
        if (tracks.length > 0) {
          widget.skip(0);
          setTimeout(() => widget.play(), 400);
        }
      });

      widget.bind(SC.Widget.Events.PLAY, () => {
        isPlaying = true;
        updatePlayBtn();
        document.getElementById('artwork-wrap').classList.add('playing');
        widget.getCurrentSoundIndex(i => {
          if (i !== currentIndex) { currentIndex = i; updateNowPlaying(); }
        });
      });

      widget.bind(SC.Widget.Events.PAUSE, () => {
        isPlaying = false;
        updatePlayBtn();
        document.getElementById('artwork-wrap').classList.remove('playing');
      });

      widget.bind(SC.Widget.Events.FINISH, () => nextTrack());

      widget.bind(SC.Widget.Events.PLAY_PROGRESS, data => {
        if (duration > 0) {
          document.getElementById('progress-fill').style.width = (data.currentPosition / duration * 100) + '%';
          document.getElementById('time-cur').textContent = fmt(data.currentPosition);
        }
      });
    });
  };
  setTimeout(tryBind, 500);
}

function updateNowPlaying() {
  if (currentIndex < 0 || currentIndex >= tracks.length) return;
  const t = tracks[currentIndex];

  document.getElementById('track-title').textContent = t.title;
  document.getElementById('track-artist').textContent = t.artist;

  const img = document.getElementById('artwork-img');
  const ph = document.getElementById('artwork-placeholder');
  if (t.art) {
    img.src = t.art;
    img.style.display = 'block';
    ph.style.display = 'none';
    // Dynamic bg
    const bg = document.getElementById('bg-art');
    bg.style.backgroundImage = `url(${t.art})`;
    bg.classList.add('visible');
  } else {
    img.style.display = 'none';
    ph.style.display = 'flex';
    document.getElementById('bg-art').classList.remove('visible');
  }

  widget.getDuration(d => {
    duration = d;
    document.getElementById('time-tot').textContent = fmt(d);
  });

  updateFavBtn();
  renderQueue();
}

// ─── Controls ──────────────────────────────────────────────────────────────
function togglePlay() {
  if (!widget) return;
  if (isPlaying) widget.pause(); else widget.play();
}

function nextTrack() {
  if (!widget || !tracks.length) return;
  let next;
  if (shuffle) next = Math.floor(Math.random() * tracks.length);
  else next = (currentIndex + 1) % tracks.length;
  widget.skip(next);
  widget.play();
}

function prevTrack() {
  if (!widget || !tracks.length) return;
  const prev = (currentIndex - 1 + tracks.length) % tracks.length;
  widget.skip(prev);
  widget.play();
}

function seekTo(e) {
  if (!widget || !duration) return;
  const bar = document.getElementById('progress-bar');
  const pct = (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth;
  widget.seekTo(pct * duration);
}

function setVolume(v) {
  if (widget) widget.setVolume(parseInt(v));
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffle);
  document.getElementById('btn-shuffle').style.color = shuffle ? 'rgba(255,255,255,0.9)' : '';
}

function favCurrent() {
  if (currentIndex < 0) return;
  const id = tracks[currentIndex].id;
  favorites.has(id) ? favorites.delete(id) : favorites.add(id);
  saveFavs(); updateFavBtn(); renderQueue();
}

function toggleFav(id, e) {
  e.stopPropagation();
  favorites.has(id) ? favorites.delete(id) : favorites.add(id);
  saveFavs(); updateFavBtn(); renderQueue();
}

function playItem(realIndex) {
  if (!widget) return;
  widget.skip(realIndex);
  widget.play();
}

// ─── UI ────────────────────────────────────────────────────────────────────
function updatePlayBtn() {
  const icon = document.getElementById('play-icon');
  icon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function updateFavBtn() {
  if (currentIndex < 0) return;
  const on = favorites.has(tracks[currentIndex]?.id);
  const icon = document.getElementById('fav-icon');
  document.getElementById('btn-fav').style.color = on ? '#ff6b9d' : '';
  icon.innerHTML = on
    ? '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>'
    : '<path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/>';
}

function getList() {
  return currentTab === 'fav'
    ? tracks.filter(t => favorites.has(t.id))
    : tracks;
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  const items = getList();

  if (!items.length) {
    list.innerHTML = `<div class="empty-queue">${currentTab === 'fav' ? 'Aucun favori' : 'Chargement…'}</div>`;
    return;
  }

  list.innerHTML = items.map(t => {
    const realIndex = tracks.indexOf(t);
    const isActive = realIndex === currentIndex;
    const isFav = favorites.has(t.id);
    return `
      <div class="queue-item ${isActive ? 'active' : ''}" onclick="playItem(${realIndex})">
        <div class="qi-art">${t.art ? `<img src="${t.art}" alt="">` : '♪'}</div>
        <div class="qi-info">
          <div class="qi-title">${t.title}</div>
          <div class="qi-artist">${t.artist}</div>
        </div>
        ${isActive && isPlaying ? `<div class="qi-playing"><span></span><span></span><span></span></div>` : ''}
        <button class="qi-fav ${isFav ? 'on' : ''}" onclick="toggleFav(${t.id}, event)">${isFav ? '♥' : '♡'}</button>
      </div>`;
  }).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');
  renderQueue();
}

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function saveFavs() { localStorage.setItem('wv_favs', JSON.stringify([...favorites])); }

// ─── Init ──────────────────────────────────────────────────────────────────
loadSCAPI();
</script>
